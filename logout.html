<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Chitkara University</title>

    <style>
        :root {
            --bg-light: #e8e6e6;
            --chitkara-red: #c53c34;
            --chitkara-blue: #003a70;
            --text-main: #1f2937;
            --text-muted: #4b5563;
        }

        body {
            background: var(--bg-light);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .logout-container {
            padding: 40px;
            max-width: 420px;
            animation: fadeIn 0.8s ease-out;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(197, 60, 52, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 24px;
            color: var(--chitkara-red);
            border: 2px solid rgba(197, 60, 52, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.6;
            font-size: 15px;
        }

        .redirect-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .redirect-text span {
            color: var(--chitkara-red);
            font-weight: bold;
            font-size: 16px;
        }

        .btn-login {
            display: inline-block;
            background: var(--chitkara-red);
            color: white;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 25px;
            font-size: 16px;
        }

        .btn-login:hover {
            background: #a32f29;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="logout-container">
        <div class="icon-circle">✓</div>

        <h1>Successfully Logged Out</h1>

        <p>Thank you for using the Chitkara University Digital Mess Card. You have been securely signed out.</p>

        <div class="redirect-text">
            Redirecting to login in <span id="timer">5</span> seconds...
        </div>

        <a href="login.html" class="btn-login">Login Now</a>
    </div>

    <script>
        let timeLeft = 5;
        const timerElement = document.getElementById('timer');

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = 'login.html';
            }
        }, 1000);
    </script>

</body>

</html>
