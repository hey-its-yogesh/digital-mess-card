<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chitkara University</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="chitkaralogo.png" alt="Chitkara Logo" class="university-logo">
                <p>Institute of Engineering & Technology</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">University Email</label>
                    <input type="email" id="email" placeholder="e.g. student@chitkara.edu.in" autocomplete="off"
                        required>
                </div>
                <button type="submit" class="sign-in-btn">Request OTP</button>
            </form>

            <div class="footer-links">
                <a href="contact.html">Facing issues? Contact Support</a>
                <p>New Student? <a href="register.html" class="privacy">Register Here</a></p>
                <a href="privacy.html" class="privacy-link">Privacy Policy</a>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>

</html>
